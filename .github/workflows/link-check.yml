name: Link check

on:
  workflow_dispatch:
  schedule:
    - cron: "20 19 * * *"

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check links
        run: npm run check-links -- --output=reports/link-check.json --concurrency=8 --timeout=12000

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: reports/link-check.json
